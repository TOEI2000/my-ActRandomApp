<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer Dashboard - Online Co-op</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- โหลดฟอนต์ -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-animate {
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* สไตล์สำหรับ Tab ที่กำลังเลือก */
        .tab-active { border-bottom-width: 3px; border-color: #6366f1; color: #4f46e5; font-weight: 600; }
        .tab-inactive { border-bottom-width: 3px; border-color: transparent; color: #64748b; font-weight: 500; }
        .tab-inactive:hover { color: #475569; border-color: #cbd5e1; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <!-- Header & Link Sharing -->
    <header class="max-w-7xl mx-auto mb-6 bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
        
        <!-- Loading overlay -->
        <div id="loading-overlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-10 flex items-center justify-center">
            <i class="fa-solid fa-circle-notch fa-spin text-indigo-500 text-3xl"></i>
            <span class="ml-3 font-medium text-slate-600">กำลังเชื่อมต่อฐานข้อมูล...</span>
        </div>

        <div>
            <h1 class="text-2xl font-bold flex items-center gap-3 text-indigo-900">
                <i class="fa-solid fa-dice text-indigo-500 text-3xl"></i>
                Randomizer Dashboard <span class="bg-emerald-100 text-emerald-600 text-xs px-2 py-1 rounded-md border border-emerald-200 ml-2 shadow-sm">Online</span>
            </h1>
            <p class="text-slate-500 text-sm mt-1">อัปเดตเรียลไทม์ • ข้อมูลตรงกันทุกเครื่อง • รีเฟรชข้อมูลไม่หาย</p>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto items-center">
            <div class="flex items-center bg-slate-100 rounded-xl p-1.5 border border-slate-200 shadow-inner">
                <span class="px-3 text-sm font-medium text-slate-500">รหัสห้อง:</span>
                <span id="room-id-display" class="font-mono font-bold text-indigo-600 px-3 py-1 bg-white rounded-lg shadow-sm tracking-widest text-lg">---</span>
            </div>
            
            <button id="copy-btn" onclick="copyLink()" class="w-full sm:w-auto px-5 py-3 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 transition-colors shadow-sm flex items-center justify-center">
                <i class="fa-solid fa-link mr-2"></i> คัดลอกลิงก์เชิญเพื่อน
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="max-w-7xl mx-auto mb-6 flex gap-6 border-b border-slate-200 px-2">
        <button onclick="switchTab('dashboard')" id="tab-btn-dashboard" class="tab-active pb-3 flex items-center gap-2 transition-colors">
            <i class="fa-solid fa-list-check"></i> หน้าหลัก (สุ่มรายการ)
        </button>
        <button onclick="switchTab('favorites')" id="tab-btn-favorites" class="tab-inactive pb-3 flex items-center gap-2 transition-colors">
            <i class="fa-solid fa-heart text-rose-500"></i> รายการโปรดทั้งหมด
        </button>
    </div>

    <!-- Main Grid (Dashboard View) - ปรับเป็น 4 คอลัมน์ -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6" id="dashboard-container">
        <!-- Rendered by JS -->
    </div>

    <!-- Favorites View (Hidden by default) -->
    <div class="max-w-7xl mx-auto hidden" id="favorites-container">
        <!-- Rendered by JS -->
    </div>

    <!-- Modal สุ่ม -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm items-center justify-center z-50 p-4 hidden flex">
        <div id="modal-content" class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center relative overflow-hidden transform scale-0">
            <div id="modal-top-bar" class="absolute top-0 left-0 right-0 h-4 bg-indigo-500"></div>
            <h3 id="modal-category-title" class="text-slate-500 text-sm font-medium mb-2 uppercase tracking-wide mt-2">ผลการสุ่ม</h3>
            <p id="modal-result-text" class="text-3xl font-bold text-slate-800 mb-8 mt-4 leading-tight">🎉 ไอเทม 🎉</p>
            <p class="text-sm text-slate-400 mb-6"><i class="fa-solid fa-clock-rotate-left mr-1"></i> ถูกย้ายไปที่ประวัติแล้ว</p>
            <button onclick="closeModal()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-medium hover:bg-slate-700 transition-colors">ตกลง</button>
        </div>
    </div>

    <!-- Firebase Online Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // เพิ่ม travel เข้าไปในโครงสร้างเริ่มต้น
        const defaultData = {
            activities: { active: [], history: [] },
            special: { active: [], history: [] },
            everyday: { active: [], history: [] },
            travel: { active: [], history: [] } 
        };

        const CATEGORIES = {
            activities: { id: 'activities', title: 'กิจกรรมทำร่วมกัน', icon: 'fa-user-group', color: 'bg-blue-100 text-blue-700', border: 'border-blue-200' },
            special: { id: 'special', title: 'ร้านอาหารมื้อพิเศษ', icon: 'fa-star', color: 'bg-purple-100 text-purple-700', border: 'border-purple-200' },
            everyday: { id: 'everyday', title: 'ร้านอาหารทั่วไป', icon: 'fa-mug-hot', color: 'bg-emerald-100 text-emerald-700', border: 'border-emerald-200' },
            travel: { id: 'travel', title: 'ประเทศที่จะไป', icon: 'fa-plane-departure', color: 'bg-sky-100 text-sky-700', border: 'border-sky-200' }
        };

        let historyToggleState = { activities: false, special: false, everyday: false, travel: false };
        let appData = defaultData;
        let roomRef = null;
        window.currentTab = 'dashboard'; // ค่าเริ่มต้นของ Tab

        // 2. ตั้งค่าการเชื่อมต่อ Firebase
        /* ⚠️ นำรหัส firebaseConfig ของคุณมาใส่ตรงนี้ ⚠️ */
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "AIzaSyDxZN7QIusq7YwHfFEcNMx447A9nzJkYqA",
          authDomain: "actrandomapp.firebaseapp.com",
          projectId: "actrandomapp",
          storageBucket: "actrandomapp.firebasestorage.app",
          messagingSenderId: "626302954284",
          appId: "1:626302954284:web:f2760bc105cf1545df1a89"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'randomizer-app';
        let currentRoomId = window.location.hash.substring(1).toUpperCase();
        
        if (!currentRoomId) {
            currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            window.location.hash = currentRoomId;
        }

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                if (typeof __firebase_config === 'undefined') {
                    alert("⚠️ เพื่อใช้งานระบบออนไลน์ คุณต้องใส่ตั้งค่า Firebase (firebaseConfig) ของตัวเองลงในโค้ดก่อนครับ");
                }
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setupRoomRealtime();
            }
        });

        initAuth();

        async function setupRoomRealtime() {
            document.getElementById('room-id-display').innerText = currentRoomId;
            roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            
            try {
                const snap = await getDoc(roomRef);
                if (!snap.exists()) {
                    await setDoc(roomRef, {
                        ...defaultData,
                        createdAt: Date.now()
                    });
                }

                onSnapshot(roomRef, (docSnap) => {
                    if (docSnap.exists()) {
                        appData = docSnap.data();
                        renderUI();
                        document.getElementById('loading-overlay').classList.add('hidden');
                    }
                }, (error) => {
                    console.error("Realtime update error:", error);
                });
            } catch (err) {
                console.error("Database Error:", err);
            }
        }

        // --- Tab Switching Logic ---
        window.switchTab = (tabName) => {
            window.currentTab = tabName;
            
            const btnDash = document.getElementById('tab-btn-dashboard');
            const btnFav = document.getElementById('tab-btn-favorites');
            
            if (tabName === 'dashboard') {
                btnDash.className = "tab-active pb-3 flex items-center gap-2 transition-colors";
                btnFav.className = "tab-inactive pb-3 flex items-center gap-2 transition-colors";
            } else {
                btnDash.className = "tab-inactive pb-3 flex items-center gap-2 transition-colors";
                btnFav.className = "tab-active pb-3 flex items-center gap-2 transition-colors";
            }
            
            renderUI();
        };

        window.generateId = () => Math.random().toString(36).substring(2, 9);

        // --- Functions สั่งงานต่างๆ ---

        window.addItem = async (event, categoryId) => {
            event.preventDefault();
            const inputEl = document.getElementById(`input-${categoryId}`);
            const linkEl = document.getElementById(`link-${categoryId}`);
            const cityEl = document.getElementById(`city-${categoryId}`); // อาจจะไม่มีถ้าไม่ใช่หมวด travel
            
            let text = inputEl.value.trim();
            const link = linkEl.value.trim();
            const city = cityEl ? cityEl.value.trim() : '';
            
            if (!text || !roomRef) return;

            // หากมีการกรอกเมือง (หมวด travel) ให้นำเมืองไปต่อท้ายประเทศ
            if (city) {
                text = `${text} (${city})`;
            }

            const newItem = { id: window.generateId(), text: text, link: link, addedAt: Date.now() };
            const currentList = appData[categoryId]?.active || [];
            
            inputEl.value = ''; 
            linkEl.value = '';  
            if (cityEl) cityEl.value = '';
            
            await updateDoc(roomRef, { [`${categoryId}.active`]: [...currentList, newItem] });
        };

        // ฟังก์ชันดึงประวัติกลับไปสุ่มใหม่
        window.reAddFromHistory = async (categoryId, itemId) => {
            if (!roomRef) return;
            const historyList = appData[categoryId].history || [];
            const item = historyList.find(i => i.id === itemId);
            if (!item) return;

            // คัดลอกสร้างเป็นไอเทมใหม่ลงใน Active
            const newItem = { id: window.generateId(), text: item.text, link: item.link || '', addedAt: Date.now() };
            const currentActive = appData[categoryId].active || [];

            await updateDoc(roomRef, { [`${categoryId}.active`]: [...currentActive, newItem] });
            
            // แสดงแจ้งเตือนเล็กๆ
            alert(`เพิ่ม "${item.text}" กลับไปรอสุ่มใหม่แล้ว!`);
        };

        // ฟังก์ชันเพิ่มรายการโปรดโดยตรง (จากหน้า Tab ที่ 2)
        window.addDirectFavorite = async (event) => {
            event.preventDefault();
            const catEl = document.getElementById('fav-category');
            const nameEl = document.getElementById('fav-name');
            const linkEl = document.getElementById('fav-link');

            const categoryId = catEl.value;
            const text = nameEl.value.trim();
            const link = linkEl.value.trim();

            if (!text || !categoryId || !roomRef) return;

            // สร้างข้อมูลแบบใส่ดาว 5 และ หัวใจอัตโนมัติ
            const newItem = {
                id: window.generateId(),
                text: text,
                link: link,
                addedAt: Date.now(),
                pickedAt: Date.now(),
                isFavorite: true,
                rating: 5
            };

            const currentHistory = appData[categoryId].history || [];
            await updateDoc(roomRef, { [`${categoryId}.history`]: [newItem, ...currentHistory] });

            nameEl.value = '';
            linkEl.value = '';
        };

        window.deleteItem = async (categoryId, itemId, isHistory) => {
            if (!roomRef) return;
            const listType = isHistory ? 'history' : 'active';
            const currentList = appData[categoryId][listType] || [];
            const newList = currentList.filter(item => item.id !== itemId);

            await updateDoc(roomRef, { [`${categoryId}.${listType}`]: newList });
        };

        window.updateHistoryItem = async (categoryId, itemId, updates) => {
            if (!roomRef) return;
            const currentHistory = appData[categoryId].history || [];
            const itemIndex = currentHistory.findIndex(i => i.id === itemId);
            if (itemIndex === -1) return;

            const newHistory = [...currentHistory];
            newHistory[itemIndex] = { ...newHistory[itemIndex], ...updates };

            await updateDoc(roomRef, { [`${categoryId}.history`]: newHistory });
        };

        window.rateItem = (categoryId, itemId, rating) => {
            window.updateHistoryItem(categoryId, itemId, { rating: rating });
        };

        window.toggleFavorite = (categoryId, itemId) => {
            const currentHistory = appData[categoryId].history || [];
            const item = currentHistory.find(i => i.id === itemId);
            if (item) {
                window.updateHistoryItem(categoryId, itemId, { isFavorite: !item.isFavorite });
            }
        };

        window.pickRandom = async (categoryId) => {
            if (!roomRef) return;
            const activeList = appData[categoryId].active || [];
            
            if (activeList.length === 0) {
                alert("กรุณาเพิ่มรายการก่อนกดสุ่มครับ!");
                return;
            }

            const randomIndex = Math.floor(Math.random() * activeList.length);
            const pickedItem = activeList[randomIndex];

            const newActive = [...activeList];
            newActive.splice(randomIndex, 1);
            
            const currentHistory = appData[categoryId].history || [];
            const newHistory = [{ ...pickedItem, pickedAt: Date.now() }, ...currentHistory];
            
            await updateDoc(roomRef, {
                [`${categoryId}.active`]: newActive,
                [`${categoryId}.history`]: newHistory
            });

            window.showModal(categoryId, pickedItem);
        };

        window.toggleHistory = (categoryId) => {
            historyToggleState[categoryId] = !historyToggleState[categoryId];
            renderUI(); 
        };

        // UI Functions
        window.showModal = (categoryId, item) => {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('modal-content');
            const catInfo = CATEGORIES[categoryId];

            document.getElementById('modal-top-bar').className = `absolute top-0 left-0 right-0 h-4 ${catInfo.color.split(' ')[0]}`;
            document.getElementById('modal-category-title').innerText = `ผลการสุ่ม ${catInfo.title}`;
            
            let resultHTML = `🎉 ${item.text} 🎉`;
            if (item.link) {
                resultHTML += `<br><a href="${item.link}" target="_blank" class="text-sm font-normal text-indigo-500 hover:text-indigo-600 hover:underline mt-3 inline-flex items-center gap-2 px-4 py-2 bg-indigo-50 rounded-full border border-indigo-100 shadow-sm transition-colors"><i class="fa-solid fa-arrow-up-right-from-square"></i> ดูรายละเอียดลิงก์</a>`;
            }
            document.getElementById('modal-result-text').innerHTML = resultHTML;

            modal.classList.remove('hidden');
            content.classList.add('modal-animate');
        };

        window.closeModal = () => {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('modal-animate');
            modal.classList.add('hidden');
        };

        window.copyLink = () => {
            const link = window.location.href;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById('copy-btn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> คัดลอกแล้ว!`;
                btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
                btn.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-600');
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.replace('bg-emerald-500', 'bg-indigo-600');
                    btn.classList.replace('hover:bg-emerald-600', 'hover:bg-indigo-700');
                }, 3000);
            }).catch(() => {
                alert("กรุณาก๊อปลิงก์ URL ด้านบนเพื่อส่งให้เพื่อน");
            });
        };

        window.addEventListener('hashchange', () => {
             window.location.reload();
        });

        // ----------------------------------------------------
        // HTML Builders
        // ----------------------------------------------------
        
        // สร้างการ์ดแสดงผล Item ใน List ต่างๆ
        function createListHTML(items, categoryId, isHistory, isFavoritesView = false) {
            if (!items || items.length === 0) {
                if (isHistory) return `<p class="text-xs text-center text-slate-400 py-3">ยังไม่มีข้อมูล</p>`;
                return `
                    <div class="text-center py-8 text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                        <p class="text-sm">ยังไม่มีรายการ</p>
                    </div>`;
            }

            return `<ul class="space-y-2">` + items.map(item => {
                let shortLinkDisplay = '';
                if (item.link) {
                    let displayLink = item.link;
                    if (displayLink.length > 30) displayLink = displayLink.substring(0, 30) + '...';
                    shortLinkDisplay = `<a href="${item.link}" target="_blank" class="block text-[11px] text-indigo-500 hover:text-indigo-700 hover:underline mt-0.5 truncate"><i class="fa-solid fa-link mr-1"></i>${displayLink}</a>`;
                }
                
                if (isHistory) {
                    const rating = item.rating || 0;
                    const starsHTML = [1, 2, 3, 4, 5].map(star =>
                        `<button onclick="rateItem('${categoryId}', '${item.id}', ${star})" class="${rating >= star ? 'text-yellow-400' : 'text-slate-200'} hover:text-yellow-500 transition-colors focus:outline-none" title="ให้ ${star} ดาว"><i class="fa-solid fa-star text-xs"></i></button>`
                    ).join('');

                    return `
                    <li class="flex flex-col p-3 bg-white border border-slate-200 rounded-xl group hover:border-slate-300 transition-colors shadow-sm">
                        <div class="flex items-start justify-between">
                            <div class="text-sm pr-2 flex-1 overflow-hidden">
                                <span class="font-medium ${isFavoritesView ? 'text-slate-800' : 'text-slate-700'} block truncate">${item.text}</span>
                                ${shortLinkDisplay}
                            </div>
                            <!-- กลุ่มปุ่มขวาบน -->
                            <div class="flex items-center gap-1 shrink-0">
                                <button onclick="reAddFromHistory('${categoryId}', '${item.id}')" class="text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors w-7 h-7 flex items-center justify-center rounded-lg" title="ดึงกลับไปสุ่มใหม่">
                                    <i class="fa-solid fa-rotate-left text-[11px]"></i>
                                </button>
                                <button onclick="deleteItem('${categoryId}', '${item.id}', true)" class="text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors w-7 h-7 flex items-center justify-center rounded-lg" title="ลบ">
                                    <i class="fa-solid fa-trash text-[11px]"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50">
                            <div class="flex gap-1 items-center">
                                <span class="text-[10px] text-slate-400 mr-1">คะแนน:</span>
                                ${starsHTML}
                            </div>
                            <button onclick="toggleFavorite('${categoryId}', '${item.id}')" class="${item.isFavorite ? 'text-rose-500 bg-rose-50 border-rose-200' : 'text-slate-400 bg-slate-50 border-slate-200'} hover:text-rose-600 hover:bg-rose-100 transition-colors flex items-center gap-1 text-[10px] font-medium px-2 py-1 rounded-full border" title="ร้านโปรด">
                                <i class="fa-solid fa-heart"></i> ${item.isFavorite ? 'ร้านโปรด' : 'ถูกใจ'}
                            </button>
                        </div>
                    </li>
                    `;
                }

                // Active Items
                return `
                <li class="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl group hover:border-slate-300 transition-colors">
                    <div class="text-sm truncate pr-2 flex-1">
                        <span class="font-medium text-slate-700 block">${item.text}</span>
                        ${shortLinkDisplay}
                    </div>
                    <button onclick="deleteItem('${categoryId}', '${item.id}', false)" class="text-slate-300 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-red-50 shrink-0" title="ลบ">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </li>
            `}).join('') + `</ul>`;
        }

        // ตัวคุมการสลับหน้าจอ และ Render ข้อมูล
        function renderUI() {
            const dashContainer = document.getElementById('dashboard-container');
            const favContainer = document.getElementById('favorites-container');
            
            if (window.currentTab === 'dashboard') {
                dashContainer.classList.remove('hidden');
                favContainer.classList.add('hidden');
                renderDashboard();
            } else {
                dashContainer.classList.add('hidden');
                favContainer.classList.remove('hidden');
                renderFavorites();
            }
        }

        // หน้าหลัก (Dashboard)
        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = '';

            Object.values(CATEGORIES).forEach(category => {
                const data = appData[category.id] || { active: [], history: [] };
                const activeCount = data.active?.length || 0;
                const historyCount = data.history?.length || 0;
                const isHistoryOpen = historyToggleState[category.id];
                
                const canPick = activeCount > 0;
                const btnClass = canPick 
                    ? 'bg-slate-800 text-white hover:bg-slate-700 hover:shadow-md transform hover:-translate-y-0.5 cursor-pointer' 
                    : 'bg-slate-100 text-slate-400 cursor-not-allowed';

                // โครงสร้างฟอร์มกรอกข้อมูล (แยกเช็คสำหรับหมวด 'travel' โดยเฉพาะ)
                let inputFormHTML = '';
                if (category.id === 'travel') {
                    inputFormHTML = `
                        <div class="flex gap-2">
                            <input type="text" id="input-${category.id}" placeholder="ชื่อประเทศ..." autocomplete="off" required
                                class="w-1/2 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                            <input type="text" id="city-${category.id}" placeholder="เมือง (ถ้ามี)..." autocomplete="off"
                                class="w-1/2 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        </div>
                    `;
                } else {
                    inputFormHTML = `
                        <input type="text" id="input-${category.id}" placeholder="ชื่อรายการ..." autocomplete="off" required
                            class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    `;
                }

                const columnHTML = `
                    <div class="flex flex-col bg-white rounded-2xl shadow-sm border ${category.border} overflow-hidden">
                        <div class="p-4 flex items-center gap-3 ${category.color} bg-opacity-30 border-b ${category.border}">
                            <div class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm ${category.color.split(' ')[1]}">
                                <i class="fa-solid ${category.icon} text-lg"></i>
                            </div>
                            <h2 class="font-bold text-lg flex-1">${category.title}</h2>
                            <span class="bg-white px-3 py-1 rounded-full text-xs font-bold shadow-sm border border-white/50">
                                ${activeCount}
                            </span>
                        </div>

                        <div class="p-5 flex-1 flex flex-col bg-white">
                            <form onsubmit="addItem(event, '${category.id}')" class="mb-5 flex flex-col gap-2 p-3 bg-slate-50 border border-slate-100 rounded-xl shadow-inner">
                                ${inputFormHTML}
                                <div class="flex gap-2">
                                    <input type="url" id="link-${category.id}" placeholder="🔗 วางลิงก์ที่นี่ (ถ้ามี)" autocomplete="off"
                                        class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white text-slate-600">
                                    <button type="submit" class="w-10 h-10 flex items-center justify-center bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow-sm shrink-0">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                            </form>

                            <button onclick="pickRandom('${category.id}')" ${!canPick ? 'disabled' : ''} 
                                class="w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 mb-6 transition-all ${btnClass}">
                                <i class="fa-solid fa-dice text-xl"></i> สุ่มเลือกเลย!
                            </button>

                            <div class="flex-1">
                                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 px-1">
                                    <i class="fa-solid fa-list-ul mr-1"></i> รายการที่รอสุ่ม
                                </h3>
                                <div class="max-h-64 overflow-y-auto pr-1 no-scrollbar">
                                    ${createListHTML(data.active, category.id, false)}
                                </div>
                            </div>
                        </div>

                        <div class="border-t border-slate-100 bg-slate-50/50">
                            <button onclick="toggleHistory('${category.id}')" class="w-full p-4 flex items-center justify-between text-sm font-medium text-slate-500 hover:bg-slate-100 transition">
                                <span class="flex items-center gap-2">
                                    <i class="fa-solid fa-clock-rotate-left"></i>
                                    ประวัติที่เลือกไปแล้ว (${historyCount})
                                </span>
                                <i class="fa-solid fa-chevron-${isHistoryOpen ? 'up' : 'down'} text-xs"></i>
                            </button>
                            <div class="${isHistoryOpen ? 'block' : 'hidden'} p-4 pt-0 border-t border-slate-100 max-h-72 overflow-y-auto no-scrollbar">
                                <div class="mt-4">
                                    ${createListHTML(data.history, category.id, true)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += columnHTML;
            });
        }

        // หน้าต่างรายการโปรด (Favorites Tab)
        function renderFavorites() {
            const container = document.getElementById('favorites-container');
            
            // ดึงข้อมูล Favorite จากทุก Category
            let favsHTML = '';
            
            Object.values(CATEGORIES).forEach(category => {
                const historyList = appData[category.id]?.history || [];
                const favItems = historyList.filter(item => item.isFavorite === true);
                
                favsHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                        <div class="p-4 flex items-center gap-3 ${category.color} bg-opacity-10 border-b border-slate-100">
                            <i class="fa-solid ${category.icon} ${category.color.split(' ')[1]}"></i>
                            <h3 class="font-bold text-slate-700">${category.title} <span class="text-sm font-normal text-slate-500 ml-1">(${favItems.length} รายการโปรด)</span></h3>
                        </div>
                        <div class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-slate-50/50">
                            ${favItems.length > 0 
                                ? createListHTML(favItems, category.id, true, true) 
                                : '<p class="text-sm text-slate-400 py-4 col-span-full">ยังไม่มีรายการโปรดในหมวดหมู่นี้</p>'}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = `
                <!-- ฟอร์มเพิ่มรายการโปรดโดยตรง -->
                <div class="bg-gradient-to-r from-rose-50 to-orange-50 p-6 rounded-2xl shadow-sm border border-rose-100 mb-8">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-rose-800">
                        <i class="fa-solid fa-heart text-rose-500"></i> เพิ่มรายการโปรดโดยตรง
                    </h2>
                    <form onsubmit="addDirectFavorite(event)" class="flex flex-col md:flex-row gap-3">
                        <select id="fav-category" required class="px-4 py-3 border border-rose-200 rounded-xl bg-white text-slate-700 font-medium focus:ring-2 focus:ring-rose-400 focus:outline-none">
                            <option value="activities">หมวด: กิจกรรมทำร่วมกัน</option>
                            <option value="special">หมวด: ร้านอาหารมื้อพิเศษ</option>
                            <option value="everyday">หมวด: ร้านอาหารทั่วไป</option>
                            <option value="travel">หมวด: ประเทศที่จะไป</option>
                        </select>
                        <input type="text" id="fav-name" placeholder="ชื่อรายการ / ประเทศ(เมือง)..." required autocomplete="off"
                            class="flex-1 px-4 py-3 border border-rose-200 rounded-xl bg-white focus:ring-2 focus:ring-rose-400 focus:outline-none">
                        <input type="url" id="fav-link" placeholder="🔗 ลิงก์ (ถ้ามี)..." autocomplete="off"
                            class="flex-1 px-4 py-3 border border-rose-200 rounded-xl bg-white text-sm focus:ring-2 focus:ring-rose-400 focus:outline-none">
                        <button type="submit" class="bg-rose-500 text-white px-8 py-3 rounded-xl hover:bg-rose-600 font-bold whitespace-nowrap shadow-sm transition-transform active:scale-95">
                            <i class="fa-solid fa-plus mr-1"></i> เพิ่มเก็บไว้
                        </button>
                    </form>
                    <p class="text-xs text-rose-500/70 mt-3"><i class="fa-solid fa-circle-info mr-1"></i> รายการที่เพิ่มตรงนี้ จะเข้าไปอยู่ในประวัติพร้อมดาว 5 ดวงอัตโนมัติ และคุณสามารถกด "ดึงกลับไปสุ่ม" (รูป 🔄) ได้เสมอ</p>
                </div>

                <!-- แสดงผลรายการโปรดแยกตามหมวดหมู่ -->
                ${favsHTML}
            `;
        }

    </script>
</body>
</html>
